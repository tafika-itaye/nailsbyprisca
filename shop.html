<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop — Nails by Prisca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Great+Vibes&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo-link">
      <span class="logo-script">Nails by Prisca</span>
    </a>
    <nav class="main-nav" id="mainNav">
      <a href="index.html" class="nav-link">Home</a>
      <a href="gallery.html" class="nav-link">Gallery</a>
      <a href="shop.html" class="nav-link active">Shop</a>
      <a href="booking.html" class="nav-link">Book</a>
      <a href="index.html#contact" class="nav-link">Contact</a>
    </nav>
    <a href="booking.html" class="btn-book-nav">Book Now</a>
    <button class="nav-toggle" id="navToggle" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</header>

<div class="page-hero">
  <p class="section-label">Browse & Order</p>
  <h1 class="section-title">Our <span class="script-inline">Shop</span></h1>
  <p style="color:var(--text-light);font-size:0.9rem;margin-top:0.4rem">Ask for price or book an appointment via WhatsApp — fast & easy.</p>
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-cat="all">All</button>
  <button class="filter-btn" data-cat="nails">💅 Nail Sets</button>
  <button class="filter-btn" data-cat="jewelry">💎 Jewellery</button>
  <button class="filter-btn" data-cat="accessories">👜 Accessories</button>
</div>

<div class="products-grid" id="productsGrid"></div>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-logo">
      <span class="script-font" style="font-size:1.8rem;color:var(--blush)">Nails by Prisca</span>
      <p>Be Your Own Kind of Beautiful</p>
    </div>
    <nav class="footer-nav">
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
      <a href="shop.html">Shop</a>
      <a href="booking.html">Book</a>
    </nav>
    <p class="footer-copy">© 2026 Nails by Prisca · Blantyre, Malawi</p>
  </div>
</footer>

<a href="https://wa.me/265889941700?text=Hi%20Prisca!%20I'd%20like%20to%20enquire%20about%20your%20products%20🌸" target="_blank" class="fab-whatsapp" aria-label="WhatsApp">

</a>

<script src="assets.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const toggle = document.getElementById('navToggle');
  const nav = document.getElementById('mainNav');
  toggle?.addEventListener('click', () => nav?.classList.toggle('open'));

  const grid = document.getElementById('productsGrid');
  const filterBar = document.getElementById('filterBar');
  let currentCat = 'all';

  function renderProducts(cat) {
    const { BASE, PRODUCTS } = window.NBP;
    const items = cat === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.category === cat);
    grid.innerHTML = items.map(p => {
      const waPrice = encodeURIComponent(`Hi Prisca! 🌸 I'd like to ask the price for:\n*${p.name}*\nCould you let me know the price please?`);
      const waBook  = encodeURIComponent(`Hi Prisca! 🌸 I'd like to book an appointment for:\n*${p.name}*\nCould we set a time please?`);
      return `
        <div class="product-card" data-cat="${p.category}">
          <div class="product-img-wrap">
            <img src="${BASE + p.img}" alt="${p.name}" loading="lazy">
            ${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}
          </div>
          <div class="product-info">
            <h3>${p.name}</h3>
            <p>${p.desc}</p>
          </div>
          <div class="product-actions">
            <a href="https://wa.me/265889941700?text=${waPrice}" target="_blank" class="btn-ask-price">Ask Price</a>
            <a href="https://wa.me/265889941700?text=${waBook}" target="_blank" class="btn-book-appt">Book</a>
          </div>
        </div>`;
    }).join('');
  }

  filterBar.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    renderProducts(currentCat);
  });

  // Auto-select from URL param
  const urlCat = new URLSearchParams(location.search).get('cat');
  if (urlCat) {
    currentCat = urlCat;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === urlCat);
    });
  }

  renderProducts(currentCat);
});
</script>
</body>
</html>
