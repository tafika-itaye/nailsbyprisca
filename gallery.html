<script src="assets.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const toggle = document.getElementById('navToggle');
  const nav = document.getElementById('mainNav');
  toggle?.addEventListener('click', () => nav?.classList.toggle('open'));

  const { BASE, IMAGES, VIDEOS, NAIL_IMAGES, JEWELLERY_IMAGES, ACCESSORY_IMAGES } = window.NBP;
  const grid = document.getElementById('galleryFullGrid');
  const filterBar = document.getElementById('galleryFilterBar');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const lbClose = document.getElementById('lightboxClose');

  // Map images to categories
  const catMap = {};
  NAIL_IMAGES.forEach(f => catMap[f] = 'nails');
  JEWELLERY_IMAGES.forEach(f => catMap[f] = 'jewelry');
  ACCESSORY_IMAGES.forEach(f => catMap[f] = 'accessories');
  VIDEOS.forEach(f => catMap[f] = 'video');
  // Any unmapped image -> all
  IMAGES.forEach(f => { if (!catMap[f]) catMap[f] = 'all'; });

  function renderGallery(cat) {
    let files = [...IMAGES, ...VIDEOS];
    if (cat !== 'all') {
      files = cat === 'video' ? VIDEOS : IMAGES.filter(f => catMap[f] === cat || catMap[f] === 'all');
    }
    grid.innerHTML = files.map(file => {
      const isVideo = file.endsWith('.mp4');
      const src = BASE + file;
      if (isVideo) {
        return `<div class="gallery-full-item" data-cat="video">
          <video src="${src}" autoplay muted loop playsinline style="width:100%;border-radius:var(--radius-sm)"></video>
          <div class="gallery-overlay"><span class="gallery-overlay-icon">▶</span></div>
        </div>`;
      }
      return `<div class="gallery-full-item" data-cat="${catMap[file] || 'all'}" data-src="${src}">
        <img src="${src}" alt="Nails by Prisca" loading="lazy">
        <div class="gallery-overlay"><span class="gallery-overlay-icon">🔍</span></div>
      </div>`;
    }).join('');

    // Bind lightbox
    grid.querySelectorAll('.gallery-full-item[data-src]').forEach(item => {
      item.addEventListener('click', () => {
        lightboxImg.src = item.dataset.src;
        lightbox.classList.add('open');
      });
    });
  }

  filterBar.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGallery(btn.dataset.cat);
  });

  lbClose.addEventListener('click', () => lightbox.classList.remove('open'));
  lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('open'); });

  renderGallery('all');
});
</script>
</body>
</html>
